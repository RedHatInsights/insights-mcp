name: Lint

on:  # yamllint disable-line rule:truthy
  pull_request:
    branches:
      - "*"
  push:
    branches:
      - main
  merge_group:

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install aspell for pyspelling
        run: sudo apt install -y aspell

      - name: Run lint
        run: make lint

      - name: Check generated docs are up to date
        run: |
          make generate-docs
          if git diff --name-only | grep .; then
            echo "Error: generated files are out of date"
            echo "Please run 'make generate-docs' and commit the changes"
            exit 1
          fi

      - name: Fail if there are changed files
        run: |
          if git diff --name-only | grep .; then
            echo "Error: there are changed files after linting"
            echo "Please run 'make lint' and commit the changes"
            exit 1
          fi
